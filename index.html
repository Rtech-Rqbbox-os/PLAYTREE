<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAYTREE — Coming Soon</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0a0f0d;color:#e8f4e8;font-family:'Segoe UI',system-ui,sans-serif;
    overflow:hidden;
  }
  .bg{
    position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(ellipse at 20% 50%,rgba(16,80,40,.3),transparent 60%),
      radial-gradient(ellipse at 80% 30%,rgba(10,60,30,.25),transparent 50%),
      radial-gradient(ellipse at 50% 80%,rgba(20,100,50,.15),transparent 60%);
  }
  .leaves{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
  .leaf{
    position:absolute;opacity:.15;
    width:20px;height:20px;background:#2d6a3f;border-radius:0 50% 50% 50%;
    animation:fall linear infinite;
  }
  @keyframes fall{
    0%{transform:translateY(-5vh) rotate(0deg);opacity:.15}
    100%{transform:translateY(105vh) rotate(720deg);opacity:0}
  }
  .container{
    position:relative;z-index:2;text-align:center;padding:2rem;
    max-width:700px;width:100%;
  }
  .badge{
    display:inline-block;padding:.4rem 1.2rem;border-radius:2rem;
    background:rgba(45,106,63,.3);border:1px solid rgba(45,106,63,.5);
    font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;
    color:#6fcf8a;margin-bottom:1.5rem;
  }
  h1{
    font-size:clamp(2rem,6vw,3.5rem);font-weight:800;
    line-height:1.1;margin-bottom:.5rem;
    background:linear-gradient(135deg,#4ade80,#16a34a,#2d6a3f);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .subtitle{
    font-size:clamp(.9rem,2.5vw,1.2rem);color:#7ab88a;
    margin-bottom:2.5rem;line-height:1.5;
  }
  .countdown{
    display:flex;justify-content:center;gap:clamp(.5rem,3vw,1.5rem);
    margin-bottom:2.5rem;flex-wrap:wrap;
  }
  .unit{
    background:rgba(16,40,24,.6);border:1px solid rgba(45,106,63,.3);
    border-radius:1rem;padding:1rem .8rem;min-width:80px;
    backdrop-filter:blur(10px);
  }
  .unit .num{
    font-size:clamp(2rem,5vw,3rem);font-weight:800;
    color:#4ade80;font-variant-numeric:tabular-nums;
  }
  .unit .label{
    font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;
    color:#6b9b7a;margin-top:.3rem;
  }
  .platforms{
    display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;
    margin-bottom:2rem;
  }
  .platform{
    padding:.6rem 1.5rem;border-radius:.8rem;
    background:rgba(45,106,63,.2);border:1px solid rgba(45,106,63,.4);
    font-size:.85rem;color:#8fd4a0;display:flex;align-items:center;gap:.5rem;
  }
  .platform .dot{
    width:8px;height:8px;border-radius:50%;
  }
  .dot.soon{background:#facc15;box-shadow:0 0 6px #facc15}
  .dot.now{background:#4ade80;box-shadow:0 0 6px #4ade80}
  .links{
    display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;
  }
  .links a{
    padding:.7rem 1.8rem;border-radius:.8rem;font-weight:600;
    text-decoration:none;font-size:.9rem;transition:all .2s;
  }
  .links .primary{
    background:linear-gradient(135deg,#16a34a,#2d6a3f);
    color:#fff;border:1px solid #2d6a3f;
  }
  .links .primary:hover{filter:brightness(1.15);transform:translateY(-1px)}
  .links .secondary{
    background:rgba(45,106,63,.15);color:#6fcf8a;
    border:1px solid rgba(45,106,63,.3);
  }
  .links .secondary:hover{background:rgba(45,106,63,.25)}
  .footer{
    margin-top:3rem;font-size:.75rem;color:#3d5a47;
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="leaves" id="leaves"></div>

<div class="container">
  <div class="badge">Apple Platforms</div>
  <h1>Coming Soon</h1>
  <p class="subtitle">PLAYTREE is coming to iOS, iPadOS, and Apple TV.<br>December 25, 2026.</p>

  <div class="countdown">
    <div class="unit"><div class="num" id="d">---</div><div class="label">Days</div></div>
    <div class="unit"><div class="num" id="h">--</div><div class="label">Hours</div></div>
    <div class="unit"><div class="num" id="m">--</div><div class="label">Minutes</div></div>
    <div class="unit"><div class="num" id="s">--</div><div class="label">Seconds</div></div>
  </div>

  <div class="platforms">
    <div class="platform"><div class="dot soon"></div>iPhone / iPad</div>
    <div class="platform"><div class="dot soon"></div>Apple TV</div>
    <div class="platform"><div class="dot now"></div>Android</div>
    <div class="platform"><div class="dot now"></div>PC</div>
    <div class="platform"><div class="dot now"></div>Linux</div>
    <div class="platform"><div class="dot now"></div>macOS</div>
  </div>

  <div class="links">
    <a class="primary" href="https://github.com/Rtech-Rqbbox-os/PLAYTREE/releases/latest">Download Now</a>
    <a class="secondary" href="https://github.com/Rtech-Rqbbox-os/PLAYTREE">Source Code</a>
  </div>

  <div class="footer">PLAYTREE — Chapter 0 : Season 0</div>
</div>

<script>
(function(){
  var target = new Date('2026-12-25T00:00:00').getTime();
  var d=document.getElementById('d'),h=document.getElementById('h'),
      m=document.getElementById('m'),s=document.getElementById('s');
  function tick(){
    var now=Date.now(),diff=target-now;
    if(diff<=0){d.textContent='0';h.textContent='0';m.textContent='0';s.textContent='0';return}
    var dd=Math.floor(diff/86400000);
    var hh=Math.floor((diff%86400000)/3600000);
    var mm=Math.floor((diff%3600000)/60000);
    var ss=Math.floor((diff%60000)/1000);
    d.textContent=dd;h.textContent=hh<10?'0'+hh:hh;
    m.textContent=mm<10?'0'+mm:mm;s.textContent=ss<10?'0'+ss:ss;
  }
  tick();setInterval(tick,1000);

  var c=document.getElementById('leaves');
  for(var i=0;i<20;i++){
    var l=document.createElement('div');l.className='leaf';
    l.style.left=Math.random()*100+'%';
    l.style.animationDuration=(8+Math.random()*12)+'s';
    l.style.animationDelay=Math.random()*10+'s';
    l.style.width=l.style.height=(10+Math.random()*15)+'px';
    c.appendChild(l);
  }
})();
</script>
</body>
</html>
